<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Endereço por CEP</title>

    <link rel="stylesheet" href="style.css">

    <script src="cep.js" defer></script>
</head>

<body>
    <main class="page-container">
        <section class="form-card">
            <h1>Consultar Endereço por CEP</h1>
            <p class="subtitle">
                Informe o CEP para preencher automaticamente os dados do endereço.
            </p>

            <hr>

            <form action="#" method="post" class="address-form">
                <div class="form-group">
                    <label for="cep">CEP</label>
                    <input
                        type="text"
                        id="cep"
                        name="cep"
                        class="form-input"
                        placeholder="Digite seu CEP"
                        inputmode="numeric"
                        autocomplete="postal-code"
                    >
                </div>

                <div class="form-group">
                    <label for="logradouro">Rua</label>
                    <input
                        type="text"
                        id="logradouro"
                        name="logradouro"
                        class="form-input"
                        placeholder="Digite o nome da sua rua"
                        autocomplete="address-line1"
                    >
                </div>

                <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <input
                        type="text"
                        id="bairro"
                        name="bairro"
                        class="form-input"
                        placeholder="Digite o seu bairro"
                    >
                </div>

                <div class="form-group">
                    <label for="localidade">Cidade</label>
                    <input
                        type="text"
                        id="localidade"
                        name="localidade"
                        class="form-input"
                        placeholder="Digite a sua cidade"
                        autocomplete="address-level2"
                    >
                </div>

                <div class="form-group">
                    <label for="uf">Estado</label>
                    <input
                        type="text"
                        id="uf"
                        name="uf"
                        class="form-input"
                        placeholder="Digite o seu estado"
                        maxlength="2"
                        autocomplete="address-level1"
                    >
                </div>

                <button type="submit" class="submit-button">
                    Enviar
                </button>
            </form>
        </section>
    </main>
</body>

</html>
